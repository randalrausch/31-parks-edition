name: Deploy (Azure)

# OPTIONAL Azure deploy. Enable it by setting the repo Variable DEPLOY_AZURE =
# "true" (Settings → Secrets and variables → Actions → Variables); it no-ops
# otherwise. DEPLOY_AZURE=true is a single switch: it activates this workflow AND
# turns off the Netlify/Supabase DEPLOY steps in ci.yml, so the two never both
# ship the frontend (they're mutually exclusive deploy targets). ci.yml's
# build-and-test quality gate still runs on every push for both back ends, so
# parity is preserved. See docs/AZURE.md for the full setup.
#
# Required when enabled:
#   Variables: DEPLOY_AZURE=true, VITE_API_BASE (your Function App URL + /api),
#              AZURE_FUNCTIONAPP_NAME
#   Secrets:   AZURE_STATIC_WEB_APPS_API_TOKEN, AZURE_FUNCTIONAPP_PUBLISH_PROFILE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.DEPLOY_AZURE == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so the build's version number (git commit count) is
          # accurate; a shallow clone would always report 1.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      # ---- Quality gate (web + api) ----
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run api:install
      - run: npm run api:typecheck
      - run: npm run api:test
      - run: npm run api:build

      # ---- Build the SPA pointed at the Azure Function ----
      - name: Build web (VITE_API_BASE -> Azure Functions)
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      # ---- Deploy backend first (so the live UI never calls a missing API) ----
      - name: Deploy Function App
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      # ---- Deploy the prebuilt static site to Static Web Apps ----
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          output_location: ""
          skip_app_build: true

      # ---- Post-deploy smoke: actually PLAY the live site ----
      # Drives a real browser against the deployed URL (SITE_URL): boots, plays a
      # solo turn, and runs a two-browser online game against the just-deployed
      # Azure backend (create → join → start → act, verifying per-seat redaction).
      # This is the end-to-end proof the deploy works, not just that files landed.
      # Skipped if SITE_URL isn't set; retries absorb CDN propagation lag.
      - name: Install Chrome for Playwright
        if: ${{ vars.SITE_URL != '' }}
        run: npx playwright install --with-deps chrome
      - name: Play the live deployment (Playwright)
        if: ${{ vars.SITE_URL != '' }}
        run: npm run test:e2e:deploy
        env:
          E2E_BASE_URL: ${{ vars.SITE_URL }}
