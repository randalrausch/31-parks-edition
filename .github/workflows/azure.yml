name: Deploy (Azure)

# OPTIONAL Azure deploy. Enable it by setting the repo Variable DEPLOY_AZURE =
# "true" (Settings → Secrets and variables → Actions → Variables); it no-ops
# otherwise. This flag is INDEPENDENT of the Supabase/Netlify deploy flags in
# ci.yml (DEPLOY_SUPABASE / DEPLOY_NETLIFY) — enable any combination: Azure only,
# the Supabase/Netlify stack only, both stacks side by side, or none. ci.yml's
# build-and-test quality gate still runs on every push for both back ends, so
# parity is preserved. See docs/AZURE.md for the full setup.
#
# Required when enabled:
#   Variables: DEPLOY_AZURE=true, VITE_API_BASE (your Function App URL + /api),
#              AZURE_FUNCTIONAPP_NAME
#   Secrets:   AZURE_STATIC_WEB_APPS_API_TOKEN, AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#   Optional:  AZURE_SITE_URL (the live SWA URL; enables the post-deploy smoke)

# The Azure deploy is GATED ON ci.yml: this workflow runs only after the CI/CD
# workflow *succeeds* on main (`workflow_run`), so a failed type-check / lint /
# unit or contract test blocks the deploy instead of racing it. It does NOT re-run
# the suite — ci.yml already did, once. A manual `workflow_dispatch` (rollback or
# forced redeploy) bypasses the gate on purpose.
on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Git ref (branch/tag/SHA) to build & deploy — defaults to the triggering commit. Use to redeploy a known-good release (rollback)."
        required: false
        default: ""

permissions:
  contents: read

# Serialize deploys (workflow_run always runs in the default-branch context, so the
# ref is constant); never cancel an in-flight deploy.
concurrency:
  group: azure-deploy
  cancel-in-progress: false

jobs:
  # Gate + classify. Runs only when ci.yml SUCCEEDED on main (or on a manual
  # dispatch) — a failed ci.yml never reaches here, so the deploy can't proceed on
  # red tests. Then avoid the double deploy: when the triggering push's commits will
  # be released, release.yml pushes a `chore(release):` commit whose own ci.yml run
  # re-triggers this workflow and ships the correctly-versioned artifact — so skip
  # the pre-bump merge commit here (classified with the shared release dry-run).
  decide:
    if: >-
      ${{ vars.DEPLOY_AZURE == 'true' && (
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
      ) }}
    runs-on: ubuntu-latest
    outputs:
      should_ship: ${{ steps.ship.outputs.should_ship }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      # The commit to deploy: the exact SHA ci.yml validated (workflow_run), or the
      # dispatch's deploy_ref / main HEAD (manual).
      - name: Resolve the commit to deploy
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.event.inputs.deploy_ref || github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - name: Will a release commit supersede this push?
        id: rel
        # Only when ci.yml ran on a real push (the merge commit). The reason=release
        # re-dispatch's ci.yml run is a workflow_dispatch, so this is skipped and the
        # release commit ships.
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' }}
        # A dry-run hiccup must never block a deploy: on failure `status` is unset,
        # which the next step reads as "not a release" → ship normally.
        continue-on-error: true
        run: node scripts/release.mjs --dry
      - name: Decide whether to ship this commit
        id: ship
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.event }}" = "push" ] && [ "${{ steps.rel.outputs.status }}" = "released" ]; then
            echo "should_ship=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release pending (${{ steps.rel.outputs.tag }}) — the version-bump commit's ci.yml run will re-trigger this deploy; skipping the merge-commit deploy."
          else
            echo "should_ship=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: decide
    # decide has already confirmed ci.yml succeeded on main (or a manual dispatch)
    # and DEPLOY_AZURE is on; a skipped decide skips this too. should_ship is false
    # only when a release commit is about to supersede this push.
    if: ${{ needs.decide.outputs.should_ship == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # The exact commit decide resolved (the one ci.yml validated, or the
          # dispatch's deploy_ref).
          ref: ${{ needs.decide.outputs.sha }}
          # Full history so the build's version number (git commit count) is
          # accurate; a shallow clone would always report 1.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      # ---- Install + package for deploy (NOT a second quality gate) ----
      # ci.yml runs typecheck/lint/unit/fuzz + the api CAS suite on this exact
      # commit in parallel, and branch protection requires those checks on PRs — so
      # re-running them here only duplicated work and gave a flaky test a second
      # chance to block a real deploy. Keep only what's needed to build and package
      # the artifacts; `npm run build` (tsc -b + vite build) still type-checks the app.
      - run: npm ci
      - run: npm run api:install
      - run: npm run api:build # bundles api/ into the Function App package deployed below

      # ---- Build the SPA pointed at the Azure Function ----
      - name: Build web (VITE_API_BASE -> Azure Functions)
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      # ---- Deploy backend first (so the live UI never calls a missing API) ----
      - name: Deploy Function App
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      # ---- Deploy the prebuilt static site to Static Web Apps ----
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          output_location: ""
          skip_app_build: true

      # ---- Warm up the just-redeployed Function App ----
      # A Consumption-plan Function App can take a few seconds to finish syncing
      # triggers / cold-start right after a zip-deploy; the smoke test's first
      # "create room" call is the first real hit it takes. Poll the health op
      # (POST {op:health} — round-trips through Table Storage, so a 200 here means
      # it's actually ready, not just that the host process exists) until it's up,
      # so a cold-start blip can't masquerade as a broken deploy.
      - name: Wait for the Function App to warm up
        if: ${{ vars.VITE_API_BASE != '' }}
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$VITE_API_BASE/game" \
              -H 'Content-Type: application/json' -d '{"op":"health"}' || true)
            if [ "$code" = "200" ]; then
              echo "Function App healthy after $i attempt(s)."
              exit 0
            fi
            echo "Attempt $i: got HTTP ${code:-<none>}, retrying…"
            sleep 3
          done
          echo "::warning::Function App didn't report healthy in time; proceeding anyway — the smoke test's own retries may still absorb it."
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      # ---- Post-deploy smoke: actually PLAY the live site ----
      # Drives a real browser against the deployed URL (AZURE_SITE_URL): boots,
      # plays a solo turn, and runs a two-browser online game against the
      # just-deployed Azure backend (create → join → start → act, verifying
      # per-seat redaction). This is the end-to-end proof the deploy works, not
      # just that files landed. Skipped if AZURE_SITE_URL isn't set; retries
      # absorb CDN propagation lag.
      - name: Install Chrome for Playwright
        if: ${{ vars.AZURE_SITE_URL != '' }}
        run: npx playwright install --with-deps chrome
      - name: Play the live deployment (Playwright)
        if: ${{ vars.AZURE_SITE_URL != '' }}
        run: npm run test:e2e:deploy
        env:
          # Azure-specific URL so this can't collide with the Netlify smoke's
          # NETLIFY_SITE_URL when both stacks deploy from the same push.
          E2E_BASE_URL: ${{ vars.AZURE_SITE_URL }}
