name: CI/CD

# Tests run on every push and PR. Deploys run on push to main, or on a manual
# "Run workflow" (workflow_dispatch) against main — handy to redeploy the
# current main without a new commit (e.g. after adding deploy secrets).
#
# The site is built HERE (in Actions, which is free for public repos) and the
# prebuilt dist/ is uploaded to Netlify — so Netlify spends ZERO of its 300
# free build-minutes/month. The Supabase backend deploys when supabase/**
# actually changed (or always, on a manual dispatch), and always BEFORE the
# frontend so the live UI never calls a function or schema that isn't live yet.
#
# Required GitHub repo Secrets (Settings → Secrets and variables → Actions) for
# deploys to work — see docs/DEPLOY.md:
#   NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD
#   VITE_SUPABASE_URL, VITE_SUPABASE_KEY   (baked into the web build)
# Optional repo Variable: SITE_URL (e.g. https://your-site.netlify.app) enables
# the post-deploy smoke check.
#
# Deploy targets are independent, positive opt-ins — set none, one, or several:
#   DEPLOY_SUPABASE=true  → deploy the Supabase backend (migrations + game fn) here
#   DEPLOY_NETLIFY=true   → deploy the prebuilt frontend to Netlify here
#   DEPLOY_AZURE=true     → deploy the Azure Function App + Static Web App
#                           (in .github/workflows/azure.yml)
# They no longer exclude each other: e.g. DEPLOY_SUPABASE+DEPLOY_NETLIFY ships the
# Supabase/Netlify stack, DEPLOY_AZURE ships Azure, both sets ship both stacks
# side by side, and setting nothing deploys nowhere. The tests/quality gate below
# runs on every push and PR regardless of any flag. See docs/DEPLOY.md & AZURE.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Don't cancel an in-flight deploy; let it finish before the next one starts.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so the build's version number (git commit count) is
          # accurate; a shallow clone would always report 1.
          fetch-depth: 0

      - name: Did the backend (supabase/**) change?
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            backend:
              - 'supabase/**'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ---- Quality gate (runs for every push and PR) ----
      - name: Type-check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit + fuzz tests
        run: npm test

      - name: Edge bundle is in sync with the engine source
        run: |
          npm run build:edge
          git diff --exit-code supabase/functions/_shared/engine.mjs \
            || (echo "::error::supabase/functions/_shared/engine.mjs is stale. Run 'npm run build:edge' and commit the result." && exit 1)

      - name: Production build
        run: npm run build
        env:
          # Baked into the bundle at build time. Absent on fork PRs → online
          # buttons hide and solo/pass-and-play still work.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

      # Azure Functions backend (api/) — type-checked, unit-tested, and bundled on
      # every push/PR. Table Storage integration tests self-skip without Azurite.
      - name: API quality gate
        run: |
          npm run api:install
          npm run api:typecheck
          npm run api:test
          npm run api:build

      # Real-browser E2E against the build just produced (solo-only — no secrets).
      - name: Install Chrome for E2E
        run: npx playwright install --with-deps chrome
      - name: E2E tests (Playwright)
        run: npx playwright test

      # ---- Deploy (only on push to main) ----
      # Backend first, and only when supabase/** changed — but a manual
      # "Run workflow" (workflow_dispatch) forces a backend deploy regardless,
      # so the function can be redeployed without a fake supabase/** commit.
      - name: Install Supabase CLI
        if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_SUPABASE == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && steps.changes.outputs.backend == 'true')) }}
        uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2
        with:
          version: latest

      - name: Deploy Supabase backend (migrations + game function)
        if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_SUPABASE == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && steps.changes.outputs.backend == 'true')) }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
          supabase functions deploy game

      - name: Deploy site to Netlify (prebuilt — no Netlify build minutes)
        if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_NETLIFY == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli deploy --prod --dir=dist --message "CI deploy ${{ github.sha }}"

      # ---- Verify the live site serves exactly what we built ----
      - name: Smoke check (live bundle matches build)
        if: ${{ github.ref == 'refs/heads/main' && vars.DEPLOY_NETLIFY == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (vars.NETLIFY_SITE_URL || vars.SITE_URL) != '' }}
        env:
          # Prefer a Netlify-specific URL so this stays correct when Azure also
          # deploys (its smoke uses AZURE_SITE_URL); fall back to the shared SITE_URL.
          SITE_URL: ${{ vars.NETLIFY_SITE_URL || vars.SITE_URL }}
        run: |
          BUILT=$(grep -o 'assets/index-[^"]*\.js' dist/index.html | head -1)
          for i in 1 2 3 4 5; do
            LIVE=$(curl -s "$SITE_URL/?cb=$i" -H 'Cache-Control: no-cache' | grep -o 'assets/index-[^"]*\.js' | head -1)
            [ "$BUILT" = "$LIVE" ] && break
            sleep 5
          done
          echo "built: $BUILT"
          echo "live : $LIVE"
          if [ "$BUILT" != "$LIVE" ]; then
            echo "::warning::Live bundle ($LIVE) does not match build ($BUILT) — likely CDN propagation lag; re-check in a minute."
          fi
