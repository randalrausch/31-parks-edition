name: CI/CD

# Tests run on every push and PR. Deploys run on push to main, or on a manual
# "Run workflow" (workflow_dispatch) against main — handy to redeploy the
# current main without a new commit (e.g. after adding deploy secrets).
#
# The quality gate is split into INDEPENDENT PARALLEL JOBS (web `gate`, `api`,
# `e2e`) so wall-clock is the slowest single job, not the sum of everything —
# and a fast failure (lint, typecheck) surfaces in seconds instead of waiting
# behind the browser E2E. The `deploy` job `needs` all three, so nothing ships
# unless every gate is green — coverage is unchanged, only the shape is faster.
#
# The site is built HERE (in Actions, which is free for public repos) and the
# prebuilt dist/ is uploaded to Netlify — so Netlify spends ZERO of its 300
# free build-minutes/month. The Supabase backend deploys when supabase/**
# actually changed (or always, on a manual dispatch), and always BEFORE the
# frontend so the live UI never calls a function or schema that isn't live yet.
#
# Required GitHub repo Secrets (Settings → Secrets and variables → Actions) for
# deploys to work — see docs/DEPLOY.md:
#   NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD
#   VITE_SUPABASE_URL, VITE_SUPABASE_KEY   (baked into the web build)
# Optional repo Variable: NETLIFY_SITE_URL (e.g. https://your-site.netlify.app)
# enables the post-deploy smoke check.
#
# Deploy targets are independent, positive opt-ins — set none, one, or several:
#   DEPLOY_SUPABASE=true  → deploy the Supabase backend (migrations + game fn) here
#   DEPLOY_NETLIFY=true   → deploy the prebuilt frontend to Netlify here
#   DEPLOY_AZURE=true     → deploy the Azure Function App + Static Web App
#                           (in .github/workflows/azure.yml)
# They no longer exclude each other: e.g. DEPLOY_SUPABASE+DEPLOY_NETLIFY ships the
# Supabase/Netlify stack, DEPLOY_AZURE ships Azure, both sets ship both stacks
# side by side, and setting nothing deploys nowhere. The tests/quality gate below
# runs on every push and PR regardless of any flag. See docs/DEPLOY.md & AZURE.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Git ref (branch/tag/SHA) to build & deploy — defaults to the triggering commit. Use to redeploy a known-good release (rollback)."
        required: false
        default: ""
      reason:
        description: "Internal signal. release.yml sets this to 'release' when it re-dispatches on the version-bump commit — that commit is byte-identical to the already-tested merge commit (only version strings + regenerated engine.mjs differ), so the gate/api/e2e jobs skip and only the deploy runs. Leave blank for manual runs (full gate)."
        required: false
        default: ""

# Superseded PR/branch runs are cancelled so a rapid series of pushes doesn't
# queue up N full runs — you only ever wait on the latest. On main we NEVER
# cancel (cancel-in-progress is false there): an in-flight deploy must finish
# before the next one starts.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: read # pull the prebuilt CI image from GHCR (used by the e2e job)

jobs:
  # ---- Web quality gate: typecheck, format, lint, unit/fuzz tests, edge-bundle
  # sync, production build. The fast checks; this is the job that fails first
  # when something's wrong. Runs on a shallow checkout — the exact build number
  # (git commit count) only matters for a shipped artifact, which the deploy job
  # rebuilds with full history.
  gate:
    # Skipped on the release re-dispatch (reason=release): that commit's code is
    # identical to the merge commit this gate already ran on. Runs for every push,
    # PR, and manual dispatch.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - run: npm ci

      - name: Type-check
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Unit + fuzz tests
        run: npm test

      - name: CI image is in sync with @playwright/test
        # Fails loudly (with the exact fix) if the prebuilt CI image's pinned
        # Playwright version drifts from the lockfile — so a Playwright bump can't
        # silently outrun the image the e2e job runs in.
        run: node scripts/check-ci-image.mjs

      - name: Edge bundle is in sync with the engine source
        run: |
          npm run build:edge
          git diff --exit-code supabase/functions/_shared/engine.mjs \
            || (echo "::error::supabase/functions/_shared/engine.mjs is stale. Run 'npm run build:edge' and commit the result." && exit 1)

      - name: Production build
        run: npm run build
        env:
          # Baked into the bundle at build time. Absent on fork PRs → online
          # buttons hide and solo/pass-and-play still work.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

  # ---- Azure Functions backend (api/): type-checked, unit-tested, and bundled
  # on every push/PR. The Table Storage CAS/atomicity suite runs against Azurite
  # here (TABLES_CONNECTION is set), so the "no lost updates" guarantee is
  # actually verified — the suite FAILS if Azurite is unreachable rather than
  # skipping silently. Runs in parallel with the web gate.
  api:
    # Skipped on the release re-dispatch (reason=release) — see the gate job.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Skip the backend suite when a change can't affect it — a docs/meta-only
      # diff (Markdown, LICENSE, editor config) never touches the api or the
      # shared engine it imports. `every` + all-negation means `code` is true
      # unless EVERY changed file is in this safe set, so we err toward RUNNING:
      # an unlisted path always runs the suite. A workflow_dispatch (the release
      # re-deploy) has no diff base, so paths-filter reports everything changed
      # and the suite runs in full.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          predicate-quantifier: "every"
          filters: |
            code:
              - '!**/*.md'
              - '!*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.editorconfig'
              - '!.prettierignore'
              - '!.prettierrc.json'
              - '!.vscode/**'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.changes.outputs.code == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      # Root deps: the api imports the shared op layer straight from ../../src.
      - run: npm ci
        if: steps.changes.outputs.code == 'true'
      - name: API quality gate
        if: steps.changes.outputs.code == 'true'
        env:
          # Well-known Azurite dev account; local emulator only, never a real key.
          TABLES_CONNECTION: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://127.0.0.1:10002/devstoreaccount1;"
        run: |
          npm run api:install
          npm run api:typecheck
          # Start Azurite's Table service (installed as an api devDependency) and
          # wait for its endpoint to accept connections before running the suite.
          ./api/node_modules/.bin/azurite-table --silent --location "$RUNNER_TEMP/azurite" &
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/10002) 2>/dev/null && { exec 3>&-; break; }
            sleep 1
          done
          npm run api:test
          npm run api:build

  # ---- Real-browser E2E (solo-only — no secrets) against a fresh production
  # build. Its own job so the ~1-2 min browser install runs alongside the other
  # gates instead of stacked after them.
  e2e:
    # Skipped on the release re-dispatch (reason=release) — see the gate job. This
    # also avoids the container image pull on those runs.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    # Run inside the prebuilt CI image (.github/ci-image) — it already carries
    # Node 20 + Chrome + the browser system libraries, so this job pulls a ready
    # image instead of running `playwright install --with-deps chrome` (~26s, and
    # the pipeline's flakiest step — a transient Chrome download failure is exactly
    # what it removes) on a cold VM every run. GITHUB_TOKEN pulls the image from
    # this repo's own GHCR namespace; no manual visibility change needed.
    container:
      image: ghcr.io/randalrausch/31-parks-edition/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Inside a container job the workspace is owned by a different UID than the
      # one git runs as, so git aborts with "detected dubious ownership". checkout
      # scopes its own safe.directory to a temporary HOME, which doesn't carry over
      # to later steps — so paths-filter's git diff (on push events; PRs use the API
      # and dodge this) fails without it. Mark the workspace trusted for all
      # subsequent git calls (paths-filter, and the version lookup in the build).
      - name: Trust the workspace for git (container job)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      # Same safe-set gate as the api job: a docs/meta-only diff can't change the
      # built app, so skip the Playwright run. `every` + all-negation errs toward
      # RUNNING.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          predicate-quantifier: "every"
          filters: |
            code:
              - '!**/*.md'
              - '!*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.editorconfig'
              - '!.prettierignore'
              - '!.prettierrc.json'
              - '!.vscode/**'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.changes.outputs.code == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - run: npm ci
        if: steps.changes.outputs.code == 'true'
      - name: E2E tests (Playwright)
        if: steps.changes.outputs.code == 'true'
        # Builds the production bundle, then plays it in the image's baked Chrome.
        run: npm run test:e2e

  # ---- Real-Postgres store contract: run the SAME runStoreContract the memory
  # store, Azurite, and the supabase-js fake run — but against a REAL local
  # Supabase stack (`supabase start`) — plus the assertions only a live database
  # can make: anon cannot EXECUTE the SECURITY DEFINER RPCs, and cannot read
  # game_secrets or the join code. This closes the gap where a migration edit to
  # the commit_game CAS (or a dropped revoke / leaky RLS policy) would pass the
  # fake-backed suite. Docker-heavy, so it only spins up the stack when
  # supabase/** actually changed; otherwise it no-ops green in seconds. Runs in
  # parallel with the other gates.
  supabase-contract:
    # Skipped on the release re-dispatch (reason=release) — see the gate job.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Did the backend (supabase/**) change?
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          # Boot the real stack when the SQL under test changes OR when the
          # contract suite that guards it changes — so an edit to either is
          # actually exercised against Postgres, not just when a migration lands.
          filters: |
            backend:
              - 'supabase/**'
              - 'src/game/supabaseStore.pg.test.ts'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.changes.outputs.backend == 'true'
        with:
          # Node 22 (not 20 like the other jobs): supabase-js' createClient
          # eagerly builds a RealtimeClient that needs a global WebSocket, which
          # Node < 21 lacks — it throws at construction. This is a test-runner
          # artifact only (prod runs on Deno / the browser, both with native
          # WebSocket; the adapter itself uses only PostgREST .from()/.rpc()).
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - run: npm ci
        if: steps.changes.outputs.backend == 'true'
      - name: Install Supabase CLI
        if: steps.changes.outputs.backend == 'true'
        uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2
        with:
          version: latest
      # `supabase start` boots the local stack AND applies the migrations/ folder
      # against real Postgres — so the SQL under test is exactly what `db push`
      # ships. `db reset` re-applies from scratch for a deterministic schema.
      - name: Start Supabase (real Postgres) and apply migrations
        if: steps.changes.outputs.backend == 'true'
        run: |
          supabase start
          supabase db reset
      - name: Run the store contract against real Postgres
        if: steps.changes.outputs.backend == 'true'
        # SUPABASE_PG_REQUIRED makes the suite FAIL (not skip) if the connection
        # env is somehow missing — so a broken export can't pass vacuously.
        env:
          SUPABASE_PG_REQUIRED: "1"
        run: |
          # Pull the live API URL + keys from the running stack and EXPORT them
          # into THIS shell so the vitest child sees them (writing $GITHUB_ENV
          # would only reach LATER steps, not this one — the suite would skip).
          #
          # Use the stable --override-name mapping, NOT `-o json` field names: the
          # latest CLI moved local stacks to the new sb_publishable/sb_secret key
          # format, so `.SERVICE_ROLE_KEY` no longer yields a key that authenticates
          # as service_role (RLS wasn't bypassed → "permission denied for table
          # games"). --override-name addresses the config value and returns a
          # working key regardless of format; the service_role key bypasses RLS,
          # which is what the Edge Function holds.
          eval "$(supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY)"
          export SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY
          # Lengths only (never the secrets) — a quick, safe confirmation that both
          # keys resolved non-empty before the suite runs.
          echo "url=$SUPABASE_URL anon_len=${#SUPABASE_ANON_KEY} service_len=${#SUPABASE_SERVICE_ROLE_KEY}"
          npx vitest run src/game/supabaseStore.pg.test.ts
      - name: Stop Supabase
        if: ${{ always() && steps.changes.outputs.backend == 'true' }}
        run: supabase stop --no-backup || true

  # ---- Deploy (only on push to main, and only when no gate FAILED). ----
  # `always()` lets this run even when the gates were SKIPPED — that happens on the
  # release re-dispatch (reason=release), where re-testing the version-bump commit
  # would be redundant (its code is identical to the merge commit the gates already
  # passed on). The result checks still block the deploy if any gate actually FAILED
  # or was cancelled, so a red gate never ships.
  deploy:
    needs: [gate, api, e2e, supabase-contract]
    if: >-
      ${{ always()
      && github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.gate.result != 'failure' && needs.gate.result != 'cancelled'
      && needs.api.result != 'failure' && needs.api.result != 'cancelled'
      && needs.e2e.result != 'failure' && needs.e2e.result != 'cancelled'
      && needs['supabase-contract'].result != 'failure' && needs['supabase-contract'].result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # A manual dispatch may pass deploy_ref to build & ship a specific
          # ref (e.g. rolling back to a known-good tag); otherwise use the
          # natural ref for this event.
          ref: ${{ github.event.inputs.deploy_ref || github.ref }}
          # Full history so the build's version number (git commit count) is
          # accurate; a shallow clone would always report 1. Tags too, so the
          # release dry-run below can see the last release tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Did the backend (supabase/**) change?
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            backend:
              - 'supabase/**'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      # Avoid the double deploy. On a push whose commits WILL be released,
      # release.yml is about to bump the version, push a `chore(release):` commit,
      # and re-dispatch this workflow on it — that dispatch ships the correctly
      # versioned artifact. Deploying the pre-bump merge commit here would ship the
      # new code under the OLD version string, only to be overwritten minutes
      # later. So classify the push with the SAME release driver (dry-run, no
      # writes, no git changes) and, when a release is pending, skip this deploy
      # and let the release commit's dispatch do it once. A workflow_dispatch (the
      # release re-deploy and manual rollbacks) always ships.
      - name: Will a release commit supersede this push?
        id: rel
        if: ${{ github.event_name == 'push' }}
        # A dry-run hiccup must never block a deploy: on failure `status` is unset,
        # which the next step reads as "not a release" → ship normally.
        continue-on-error: true
        run: node scripts/release.mjs --dry
      - name: Decide whether to ship this commit
        id: ship
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.rel.outputs.status }}" = "released" ]; then
            echo "should_ship=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release pending (${{ steps.rel.outputs.tag }}) — the version-bump commit's dispatch will ship it; skipping this merge-commit deploy to avoid a double deploy."
          else
            echo "should_ship=true" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: ${{ steps.ship.outputs.should_ship == 'true' }}

      - name: Production build (secrets baked in)
        if: ${{ steps.ship.outputs.should_ship == 'true' }}
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

      # Backend first, and only when supabase/** changed — but a manual
      # "Run workflow" (workflow_dispatch) forces a backend deploy regardless,
      # so the function can be redeployed without a fake supabase/** commit.
      - name: Install Supabase CLI
        if: ${{ steps.ship.outputs.should_ship == 'true' && vars.DEPLOY_SUPABASE == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && steps.changes.outputs.backend == 'true')) }}
        uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2
        with:
          version: latest

      - name: Deploy Supabase backend (migrations + game function)
        if: ${{ steps.ship.outputs.should_ship == 'true' && vars.DEPLOY_SUPABASE == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && steps.changes.outputs.backend == 'true')) }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
          supabase functions deploy game

      - name: Deploy site to Netlify (prebuilt — no Netlify build minutes)
        if: ${{ steps.ship.outputs.should_ship == 'true' && vars.DEPLOY_NETLIFY == 'true' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli deploy --prod --dir=dist --message "CI deploy ${{ github.sha }}"

      # ---- Verify the live site serves exactly what we built ----
      - name: Smoke check (live bundle matches build)
        if: ${{ steps.ship.outputs.should_ship == 'true' && vars.DEPLOY_NETLIFY == 'true' && vars.NETLIFY_SITE_URL != '' }}
        env:
          # Netlify-specific URL so this can't collide with the Azure smoke's
          # AZURE_SITE_URL when both stacks deploy from the same push.
          NETLIFY_SITE_URL: ${{ vars.NETLIFY_SITE_URL }}
        run: |
          BUILT=$(grep -o 'assets/index-[^"]*\.js' dist/index.html | head -1)
          for i in 1 2 3 4 5; do
            LIVE=$(curl -s "$NETLIFY_SITE_URL/?cb=$i" -H 'Cache-Control: no-cache' | grep -o 'assets/index-[^"]*\.js' | head -1)
            [ "$BUILT" = "$LIVE" ] && break
            sleep 5
          done
          echo "built: $BUILT"
          echo "live : $LIVE"
          if [ "$BUILT" != "$LIVE" ]; then
            echo "::warning::Live bundle ($LIVE) does not match build ($BUILT) — likely CDN propagation lag; re-check in a minute."
          fi

      # ---- Post-deploy smoke: actually PLAY the live Netlify/Supabase stack ----
      # The hash check above only proves the right files landed. This drives a
      # real browser against the deployed URL and plays it — boot + solo turn +
      # a two-browser online round (create → join → start → act) against the live
      # Supabase backend, proving per-seat redaction end to end. Runs whenever the
      # frontend deploys and a live URL is set — NOT gated on a Supabase deploy
      # this run. The spec self-skips the online round when the built site has no
      # backend configured, so a frontend-only deploy still gets played (boot +
      # solo turn) instead of shipping unverified; retries absorb CDN propagation lag.
      - name: Install Chrome for Playwright
        if: ${{ steps.ship.outputs.should_ship == 'true' && vars.DEPLOY_NETLIFY == 'true' && vars.NETLIFY_SITE_URL != '' }}
        run: npx playwright install --with-deps chrome
      - name: Play the live Netlify deployment (Playwright)
        if: ${{ steps.ship.outputs.should_ship == 'true' && vars.DEPLOY_NETLIFY == 'true' && vars.NETLIFY_SITE_URL != '' }}
        env:
          E2E_BASE_URL: ${{ vars.NETLIFY_SITE_URL }}
        run: npm run test:e2e:deploy
