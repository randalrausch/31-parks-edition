name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Unit + fuzz tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Edge bundle is in sync with the engine source
        run: |
          npm run build:edge
          git diff --exit-code supabase/functions/_shared/engine.mjs \
            || (echo "::error::supabase/functions/_shared/engine.mjs is stale. Run 'npm run build:edge' and commit the result." && exit 1)
