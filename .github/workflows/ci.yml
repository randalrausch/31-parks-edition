name: CI/CD

# Tests run on every push and PR. Deploys run on push to main, or on a manual
# "Run workflow" (workflow_dispatch) against main — handy to redeploy the
# current main without a new commit (e.g. after adding deploy secrets).
#
# The quality gate is split into INDEPENDENT PARALLEL JOBS (web `gate`, `api`,
# `e2e`, `supabase-contract`, plus PR-only `dependency-review`) so wall-clock is
# the slowest single job, not the sum of everything — and a fast failure (lint,
# typecheck) surfaces in seconds instead of waiting behind the browser E2E. The
# deploy jobs `need` every gate (via `decide`), so nothing ships unless all are
# green — coverage is unchanged, only the shape is faster.
#
# The site is built HERE (in Actions, which is free for public repos) and the
# prebuilt dist/ is uploaded to Netlify — so Netlify spends ZERO of its 300
# free build-minutes/month. The Supabase backend deploys when supabase/**
# actually changed (or always, on a manual dispatch), and always BEFORE the
# frontend so the live UI never calls a function or schema that isn't live yet.
#
# Required GitHub repo Secrets (Settings → Secrets and variables → Actions) for
# deploys to work — see docs/DEPLOY.md:
#   NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD
#   VITE_SUPABASE_URL, VITE_SUPABASE_KEY   (baked into the web build)
# Optional repo Variable: NETLIFY_SITE_URL (e.g. https://your-site.netlify.app)
# enables the post-deploy smoke check.
#
# Deploy targets are independent, positive opt-ins — set none, one, or several:
#   DEPLOY_SUPABASE=true  → deploy the Supabase backend (migrations + game fn) here
#   DEPLOY_NETLIFY=true   → deploy the prebuilt frontend to Netlify here
#   DEPLOY_AZURE=true     → deploy the Azure Function App + Static Web App
# Each target is its own deploy job below (deploy-supabase-netlify / deploy-azure),
# gated on the same green gate and SKIPPED ENTIRELY when its flag is off — so a
# disabled target costs zero runner time. They no longer exclude each other: enable
# any combination, or none (deploys nowhere). The tests/quality gate below runs on
# every push and PR regardless of any flag. See docs/DEPLOY.md & AZURE.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Git ref (branch/tag/SHA) to build & deploy — defaults to the triggering commit. Use to redeploy a known-good release (rollback)."
        required: false
        default: ""
      reason:
        description: "Internal signal. release.yml sets this to 'release' when it re-dispatches on the version-bump commit — that commit is byte-identical to the already-tested merge commit (only version strings + regenerated engine.mjs differ), so the gate/api/e2e jobs skip and only the deploy runs. Leave blank for manual runs (full gate)."
        required: false
        default: ""

# Superseded PR/branch runs are cancelled so a rapid series of pushes doesn't
# queue up N full runs — you only ever wait on the latest. On main we NEVER
# cancel (cancel-in-progress is false there): an in-flight deploy must finish
# before the next one starts.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: read # pull the prebuilt CI image from GHCR (used by the e2e job)

jobs:
  # ---- Web quality gate: typecheck, format, lint, unit/fuzz tests, edge-bundle
  # sync, production build. The fast checks; this is the job that fails first
  # when something's wrong. Runs on a shallow checkout — the exact build number
  # (git commit count) only matters for a shipped artifact, which the deploy job
  # rebuilds with full history.
  gate:
    # Skipped on the release re-dispatch (reason=release): that commit's code is
    # identical to the merge commit this gate already ran on. Runs for every push,
    # PR, and manual dispatch.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15 # cost guard - a hung job can't burn the 6h default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - run: npm ci

      - name: Type-check
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint

      - name: Lint workflows (actionlint)
        # The workflows are this repo's most-edited, least-tested code — actionlint
        # catches expression/needs/shell mistakes at PR time instead of at run time
        # (it also feeds each `run:` script through the runner's shellcheck).
        # Pinned by version AND sha256, matching the repo's SHA-pinning discipline
        # for actions; bump both together.
        run: |
          curl -sSfL -o /tmp/actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  /tmp/actionlint.tar.gz" | sha256sum -c -
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -color

      - name: Unit + fuzz tests
        if: ${{ github.ref != 'refs/heads/main' }}
        run: npm test
      - name: Unit + fuzz tests (with coverage summary)
        # Same suite, but on main the V8 coverage summary lands in the run's Step
        # Summary — ambient visibility of coverage drift without a threshold gate
        # (thresholds invite vanity coverage; the number is for humans to watch).
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash # explicit bash => pipefail, so a test failure survives the tee
        run: |
          npm run test:coverage -- --coverage.reporter=text-summary | tee /tmp/coverage.out
          {
            echo "### Unit test coverage (V8)"
            echo '```'
            sed -n '/% Coverage report/,$p' /tmp/coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: CI image is in sync with @playwright/test
        # Fails loudly (with the exact fix) if the prebuilt CI image's pinned
        # Playwright version drifts from the lockfile — so a Playwright bump can't
        # silently outrun the image the e2e job runs in.
        run: node scripts/check-ci-image.mjs

      - name: Edge bundle is in sync with the engine source
        run: |
          npm run build:edge
          git diff --exit-code supabase/functions/_shared/engine.mjs \
            || (echo "::error::supabase/functions/_shared/engine.mjs is stale. Run 'npm run build:edge' and commit the result." && exit 1)

      - name: Production build
        run: npm run build
        env:
          # Baked into the bundle at build time. Absent on fork PRs → online
          # buttons hide and solo/pass-and-play still work.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

  # ---- Azure Functions backend (api/): type-checked, unit-tested, and bundled
  # on every push/PR. The Table Storage CAS/atomicity suite runs against Azurite
  # here (TABLES_CONNECTION is set), so the "no lost updates" guarantee is
  # actually verified — the suite FAILS if Azurite is unreachable rather than
  # skipping silently. Runs in parallel with the web gate.
  api:
    # Skipped on the release re-dispatch (reason=release) — see the gate job.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15 # cost guard - a hung job can't burn the 6h default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Skip the backend suite when a change can't affect it — a docs/meta-only
      # diff (Markdown, LICENSE, editor config) never touches the api or the
      # shared engine it imports. `every` + all-negation means `code` is true
      # unless EVERY changed file is in this safe set, so we err toward RUNNING:
      # an unlisted path always runs the suite. A workflow_dispatch (the release
      # re-deploy) has no diff base, so paths-filter reports everything changed
      # and the suite runs in full.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          predicate-quantifier: "every"
          filters: |
            code:
              - '!**/*.md'
              - '!*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.editorconfig'
              - '!.prettierignore'
              - '!.prettierrc.json'
              - '!.vscode/**'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.changes.outputs.code == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      # Root deps: the api imports the shared op layer straight from ../../src.
      - run: npm ci
        if: steps.changes.outputs.code == 'true'
      - name: API quality gate
        if: steps.changes.outputs.code == 'true'
        env:
          # Well-known Azurite dev account; local emulator only, never a real key.
          TABLES_CONNECTION: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;TableEndpoint=http://127.0.0.1:10002/devstoreaccount1;"
        run: |
          npm run api:install
          npm run api:typecheck
          # Start Azurite's Table service (installed as an api devDependency) and
          # wait for its endpoint to accept connections before running the suite.
          ./api/node_modules/.bin/azurite-table --silent --location "$RUNNER_TEMP/azurite" &
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/10002) 2>/dev/null && { exec 3>&-; break; }
            echo "Waiting for Azurite to accept connections ($i)…"
            sleep 1
          done
          npm run api:test
          npm run api:build

  # ---- Real-browser E2E (no secrets) against a fresh production build: the solo
  # flow, the axe accessibility scan, and a two-browser ONLINE round against a
  # local in-memory backend (e2e/localServer.ts) — so online regressions fail the
  # PR, not the post-deploy smoke. Its own job so the browser-image pull runs
  # alongside the other gates instead of stacked after them.
  e2e:
    # Skipped on the release re-dispatch (reason=release) — see the gate job. This
    # also avoids the container image pull on those runs.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20 # cost guard - a hung job can't burn the 6h default
    # Run inside the prebuilt CI image (.github/ci-image) — it already carries
    # Node + Chrome + the browser system libraries, so this job pulls a ready
    # image instead of running `playwright install --with-deps chrome` (~26s, and
    # the pipeline's flakiest step — a transient Chrome download failure is exactly
    # what it removes) on a cold VM every run. GITHUB_TOKEN pulls the image from
    # this repo's own GHCR namespace; no manual visibility change needed.
    # The image name is derived from the repo so a fork pulls ITS OWN image (run
    # the "Build CI image" workflow once after forking to publish it). GHCR
    # requires a lowercase name — true here; an uppercase fork owner must
    # hardcode a lowercased name instead (see .github/ci-image/README.md).
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Inside a container job the workspace is owned by a different UID than the
      # one git runs as, so git aborts with "detected dubious ownership". checkout
      # scopes its own safe.directory to a temporary HOME, which doesn't carry over
      # to later steps — so paths-filter's git diff (on push events; PRs use the API
      # and dodge this) fails without it. Mark the workspace trusted for all
      # subsequent git calls (paths-filter, and the version lookup in the build).
      - name: Trust the workspace for git (container job)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      # Same safe-set gate as the api job: a docs/meta-only diff can't change the
      # built app, so skip the Playwright run. `every` + all-negation errs toward
      # RUNNING.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          predicate-quantifier: "every"
          filters: |
            code:
              - '!**/*.md'
              - '!*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.editorconfig'
              - '!.prettierignore'
              - '!.prettierrc.json'
              - '!.vscode/**'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.changes.outputs.code == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - run: npm ci
        if: steps.changes.outputs.code == 'true'
      - name: E2E tests (Playwright)
        if: steps.changes.outputs.code == 'true'
        # Builds the production bundle, then plays it in the image's baked Chrome.
        run: npm run test:e2e
      - name: Upload traces on failure
        # Playwright records a trace on first retry (playwright.config.ts); ship
        # test-results/ (traces, error context, screenshots) as an artifact so a
        # CI-only failure is debuggable in the trace viewer instead of guessed at
        # from the line reporter. Costs nothing when green.
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ---- Supply-chain gate: fails a PR that ADDS a dependency with known vulns
  # or a disallowed license change. Complements Dependabot (which only updates
  # EXISTING deps — it never vets a brand-new package a PR introduces). Diff-based
  # and read-only, so it's fork-safe; PR-only because it compares base..head.
  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10 # cost guard - a hung job can't burn the 6h default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high # block known-bad; leave low/moderate to Dependabot's cadence
          comment-summary-in-pr: on-failure

  # ---- Real-Postgres contract: boot a REAL local Supabase stack
  # (`supabase start`) and assert the SQL directly with psql — the commit_game
  # CAS, the create_game atomicity/collision, the anon EXECUTE revokes on the
  # SECURITY DEFINER RPCs, and the RLS that hides game_secrets and the join code.
  # This closes the gap where a migration edit could pass the fake-backed suite.
  #
  # Why psql and not the supabase-js store contract: Supabase CLI 2.71.1+ signs
  # the local stack's JWTs with ES256 (asymmetric), which the local PostgREST
  # doesn't verify for supabase-js — so no key (service_role JWT or the new
  # sb_secret) authenticates as service_role locally (supabase/cli#4524, closed
  # not-planned). Asserting the SQL over psql sidesteps the whole key/JWT layer,
  # needs no pinned/legacy CLI, and tests exactly what a bad migration would
  # break. The adapter code itself stays covered by the fake-backed
  # runStoreContract in src/game/supabaseStore.test.ts.
  #
  # Docker-heavy, so it only spins up the stack when supabase/** actually changed;
  # otherwise it no-ops green in seconds. Runs in parallel with the other gates.
  supabase-contract:
    # Skipped on the release re-dispatch (reason=release) — see the gate job.
    if: ${{ github.event.inputs.reason != 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20 # cost guard - a hung job can't burn the 6h default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Did the backend (supabase/**) change?
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            backend:
              - 'supabase/**'
      - name: Install Supabase CLI
        if: steps.changes.outputs.backend == 'true'
        uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2
        with:
          version: latest
      # `supabase start` boots the local stack AND applies the migrations/ folder
      # against real Postgres — so the SQL under test is exactly what `db push`
      # ships. `db reset` re-applies from scratch for a deterministic schema.
      - name: Start Supabase (real Postgres) and apply migrations
        if: steps.changes.outputs.backend == 'true'
        run: |
          supabase start
          supabase db reset
      - name: Assert the SQL contract against real Postgres
        if: steps.changes.outputs.backend == 'true'
        run: |
          # DB_URL is the local superuser connection string (postgres). psql is
          # preinstalled on ubuntu runners. ON_ERROR_STOP turns any RAISE in the
          # checks into a non-zero exit, failing the job.
          DB_URL="$(supabase status -o json | jq -r '.DB_URL')"
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/tests/contract.sql
      - name: Stop Supabase
        if: ${{ always() && steps.changes.outputs.backend == 'true' }}
        run: supabase stop --no-backup || true

  # ---- Deploy: one gate, one ship decision, one job per target ----
  # Every deploy target (Supabase, Netlify, Azure) is a peer job here, gated on the
  # SAME green gate (via `needs`) and skipped entirely when its flag is off — so a
  # disabled target costs zero runner time and a red gate ships nothing. `decide`
  # makes the release/ship call ONCE and every target job reads it.

  # Runs on push/dispatch to main unless a gate FAILED. `always()` lets it run when
  # the gates were SKIPPED — the reason=release re-dispatch, where re-testing the
  # version-bump commit (identical code) would be redundant. Resolves the exact
  # commit to ship and whether to ship it (skip the pre-bump merge commit when a
  # release is pending; the release commit's own dispatch ships the versioned build).
  decide:
    needs: [gate, api, e2e, supabase-contract]
    if: >-
      ${{ always()
      && github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.gate.result != 'failure' && needs.gate.result != 'cancelled'
      && needs.api.result != 'failure' && needs.api.result != 'cancelled'
      && needs.e2e.result != 'failure' && needs.e2e.result != 'cancelled'
      && needs['supabase-contract'].result != 'failure' && needs['supabase-contract'].result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10 # cost guard - a hung job can't burn the 6h default
    outputs:
      should_ship: ${{ steps.ship.outputs.should_ship }}
      ref: ${{ steps.ship.outputs.ref }}
      backend_changed: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # A manual dispatch may pass deploy_ref to ship a specific ref (e.g.
          # rolling back to a known-good tag); otherwise the exact triggering commit.
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}
          # Full history + tags so the version (commit count) is accurate and the
          # release dry-run below can see the last release tag.
          fetch-depth: 0
          fetch-tags: true
      - name: Did the backend (supabase/**) change?
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            backend:
              - 'supabase/**'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
      # Avoid the double deploy: on a push whose commits WILL be released, release.yml
      # bumps the version, pushes a `chore(release):` commit, and re-dispatches this
      # workflow on it — that dispatch ships the correctly-versioned artifact. Classify
      # the push with the shared release driver (dry-run: no writes, no git changes)
      # and, when a release is pending, skip here. workflow_dispatch always ships.
      - name: Will a release commit supersede this push?
        id: rel
        if: ${{ github.event_name == 'push' }}
        # A dry-run hiccup must never block a deploy: on failure `status` is unset,
        # which the next step reads as "not a release" → ship normally.
        continue-on-error: true
        run: node scripts/release.mjs --dry
      - name: Decide whether to ship this commit
        id: ship
        run: |
          echo "ref=${{ github.event.inputs.deploy_ref || github.sha }}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.rel.outputs.status }}" = "released" ]; then
            echo "should_ship=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release pending (${{ steps.rel.outputs.tag }}) — the version-bump commit's dispatch ships it; skipping this merge-commit deploy."
          else
            echo "should_ship=true" >> "$GITHUB_OUTPUT"
          fi

  # The Supabase/Netlify stack: the Netlify frontend is built against the Supabase
  # backend URL, so they share one build and deploy backend-before-frontend. The
  # whole job skips unless at least one flag is on; inside, each piece is flag-gated,
  # and the frontend build runs ONLY when Netlify is on (Supabase is backend-only).
  deploy-supabase-netlify:
    needs: decide
    # `!cancelled()` is required, not cosmetic: on a reason=release re-dispatch the
    # gate jobs are SKIPPED, and that skip propagates through `decide` (which runs via
    # always()) to anything that `needs` it — so without a status function here the job
    # inherits the skip and never evaluates its own condition. `decide.should_ship`
    # already encodes "no gate failed", so guarding on !cancelled() is safe.
    if: ${{ !cancelled() && needs.decide.outputs.should_ship == 'true' && (vars.DEPLOY_SUPABASE == 'true' || vars.DEPLOY_NETLIFY == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30 # cost guard - a hung job can't burn the 6h default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.decide.outputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json
      - run: npm ci

      # Backend first (only when supabase/** changed, or forced by a manual dispatch)
      # so the frontend never calls a function that isn't live yet.
      - name: Install Supabase CLI
        if: ${{ vars.DEPLOY_SUPABASE == 'true' && (github.event_name == 'workflow_dispatch' || needs.decide.outputs.backend_changed == 'true') }}
        uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2
        with:
          version: latest
      - name: Deploy Supabase backend (migrations + game function)
        if: ${{ vars.DEPLOY_SUPABASE == 'true' && (github.event_name == 'workflow_dispatch' || needs.decide.outputs.backend_changed == 'true') }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
          supabase functions deploy game

      # Frontend (Netlify) — built against the Supabase URL. Only when Netlify is on.
      - name: Production build (Supabase URL baked in)
        if: ${{ vars.DEPLOY_NETLIFY == 'true' }}
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
      - name: Deploy site to Netlify (prebuilt — no Netlify build minutes)
        if: ${{ vars.DEPLOY_NETLIFY == 'true' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli deploy --prod --dir=dist --message "CI deploy ${{ github.sha }}"

      # ---- Verify the live site serves exactly what we built ----
      - name: Smoke check (live bundle matches build)
        if: ${{ vars.DEPLOY_NETLIFY == 'true' && vars.NETLIFY_SITE_URL != '' }}
        env:
          NETLIFY_SITE_URL: ${{ vars.NETLIFY_SITE_URL }}
        run: |
          BUILT=$(grep -o 'assets/index-[^"]*\.js' dist/index.html | head -1)
          for i in 1 2 3 4 5; do
            LIVE=$(curl -s "$NETLIFY_SITE_URL/?cb=$i" -H 'Cache-Control: no-cache' | grep -o 'assets/index-[^"]*\.js' | head -1)
            [ "$BUILT" = "$LIVE" ] && break
            sleep 5
          done
          echo "built: $BUILT"
          echo "live : $LIVE"
          if [ "$BUILT" != "$LIVE" ]; then
            echo "::warning::Live bundle ($LIVE) does not match build ($BUILT) — likely CDN propagation lag; re-check in a minute."
          fi

      # ---- Post-deploy smoke: actually PLAY the live Netlify/Supabase stack ----
      - name: Install Chrome for Playwright
        if: ${{ vars.DEPLOY_NETLIFY == 'true' && vars.NETLIFY_SITE_URL != '' }}
        run: npx playwright install --with-deps chrome
      - name: Play the live Netlify deployment (Playwright)
        if: ${{ vars.DEPLOY_NETLIFY == 'true' && vars.NETLIFY_SITE_URL != '' }}
        env:
          E2E_BASE_URL: ${{ vars.NETLIFY_SITE_URL }}
        run: npm run test:e2e:deploy

  # The Azure stack: Static Web App frontend (built against VITE_API_BASE) + Function
  # App backend. Self-contained; skips entirely unless DEPLOY_AZURE is on.
  deploy-azure:
    needs: decide
    # See deploy-supabase-netlify: `!cancelled()` keeps this job from inheriting the
    # gate-skip that propagates through `decide` on a reason=release re-dispatch.
    if: ${{ !cancelled() && needs.decide.outputs.should_ship == 'true' && vars.DEPLOY_AZURE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30 # cost guard - a hung job can't burn the 6h default
    permissions:
      contents: read
      id-token: write # mint the OIDC token azure/login exchanges (no stored cloud secret)
    env:
      # Preferred path: OIDC federated login — set the three identity secrets
      # (values come from `azd provision` outputs; docs/AZURE.md → "Deploy from
      # CI without stored credentials") and CI deploys with a per-run token
      # instead of long-lived credentials. When they're unset, every step below
      # falls back to the legacy stored secrets (publish profile + SWA deploy
      # token), so a half-migrated repo still deploys.
      USE_OIDC: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.decide.outputs.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      # Install + package (NOT a second quality gate — ci.yml's jobs above already
      # gated this commit). `npm run build` still type-checks the app via tsc -b.
      - run: npm ci
      - run: npm run api:install
      - run: npm run api:build # bundles api/ into the Function App package deployed below
      - name: Build web (VITE_API_BASE -> Azure Functions)
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      # ---- Deploy backend first (so the live UI never calls a missing API) ----
      - name: Azure login (OIDC — per-run federated token)
        if: ${{ env.USE_OIDC == 'true' }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Function App (OIDC / RBAC)
        if: ${{ env.USE_OIDC == 'true' }}
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: api
      - name: Deploy Function App (legacy stored publish profile)
        if: ${{ env.USE_OIDC != 'true' }}
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      # SWA uploads always need a deployment token; under OIDC it's fetched for
      # this run only (and masked) instead of living forever as a repo secret.
      - name: Fetch the SWA deployment token (OIDC)
        id: swa
        if: ${{ env.USE_OIDC == 'true' }}
        run: |
          token=$(az staticwebapp secrets list --name "${{ vars.AZURE_SWA_NAME }}" \
            --query 'properties.apiKey' -o tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          # The freshly-fetched token under OIDC; the stored secret otherwise.
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          output_location: ""
          skip_app_build: true

      # ---- Warm up the just-redeployed Function App (Consumption plan can cold-start) ----
      - name: Wait for the Function App to warm up
        if: ${{ vars.VITE_API_BASE != '' }}
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$VITE_API_BASE/game" \
              -H 'Content-Type: application/json' -d '{"op":"health"}' || true)
            if [ "$code" = "200" ]; then
              echo "Function App healthy after $i attempt(s)."
              exit 0
            fi
            echo "Attempt $i: got HTTP ${code:-<none>}, retrying…"
            sleep 3
          done
          echo "::warning::Function App didn't report healthy in time; proceeding anyway — the smoke test's own retries may still absorb it."
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      # ---- Post-deploy smoke: actually PLAY the live Azure stack ----
      - name: Install Chrome for Playwright
        if: ${{ vars.AZURE_SITE_URL != '' }}
        run: npx playwright install --with-deps chrome
      - name: Play the live deployment (Playwright)
        if: ${{ vars.AZURE_SITE_URL != '' }}
        run: npm run test:e2e:deploy
        env:
          E2E_BASE_URL: ${{ vars.AZURE_SITE_URL }}
