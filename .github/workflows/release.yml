name: Release

# Automated versioning + changelog from Conventional Commits.
#
# On every push to main, this reads the commits since the last tag and:
#   - feat: → minor, fix:/perf: → patch, `!`/BREAKING CHANGE → major
#     (a breaking change while pre-1.0 bumps the minor, never jumps to 1.0.0)
#   - only chore/docs/etc. → no release (nothing happens)
#   - commits it can't classify with no releasing signal → opens an issue asking
#     a human to decide, instead of guessing
#
# A release updates src/game/version.ts (the single version source both backends
# and the frontend read), regenerates the edge bundle, prepends CHANGELOG.md,
# commits `chore(release): vX.Y.Z [skip ci]`, tags it, and publishes a GitHub
# Release.
#
# The version-bump push targets `main`, which requires status checks even on
# direct pushes — a rule the default GITHUB_TOKEN can't satisfy from here. So the
# push authenticates as a GitHub App that sits on the ruleset's bypass list (see
# docs/CI.md → "Release automation" for the one-time setup); it falls back to
# GITHUB_TOKEN when the App isn't configured (e.g. a fork whose main has no such
# rule). The commit is tagged `[skip ci]`, so it never re-triggers push workflows
# and thus never deploys on its own — the last step explicitly dispatches the
# deploy on main (GITHUB_TOKEN *can* trigger workflow_dispatch) so the
# freshly-released commit is what actually ships.

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  actions: write # dispatch the deploy workflows after a release (see final step)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Don't act on the bot's own release commit.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15 # cost guard - a hung job can't burn the 6h default
    steps:
      # Mint a short-lived token for the GitHub App that's on the `main` ruleset's
      # bypass list, so the version-bump push below clears the required-status-checks
      # rule the default GITHUB_TOKEN can't. continue-on-error + the `||` fallback on
      # checkout keep this a no-op where the App isn't configured (the push then uses
      # GITHUB_TOKEN, as before). One-time setup: docs/CI.md → "Release automation".
      - name: Mint a GitHub App token for the release push
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Push as the App (bypasses the branch ruleset); GITHUB_TOKEN if unset.
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Decide release from Conventional Commits
        id: decide
        run: node scripts/release.mjs

      - name: Seed the baseline tag (first run, no bump)
        if: ${{ steps.decide.outputs.status == 'baseline' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.decide.outputs.tag }}"
          git push origin "${{ steps.decide.outputs.tag }}"
          gh release create "${{ steps.decide.outputs.tag }}" \
            --title "${{ steps.decide.outputs.tag }}" \
            --notes-file .release-notes.md

      - name: Regenerate edge bundle for the new version
        if: ${{ steps.decide.outputs.status == 'released' }}
        run: npm run build:edge

      - name: Commit, tag, and publish the release
        if: ${{ steps.decide.outputs.status == 'released' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): ${{ steps.decide.outputs.tag }} [skip ci]"
          git push origin HEAD:main
          # Tag the release commit and push the tag EXPLICITLY. The previous
          # `git push --follow-tags` pushes only ANNOTATED tags, so these
          # lightweight release tags never reached origin — leaving `git describe`
          # stuck at the baseline and re-counting all history on every release
          # (the cause of the spurious v0.2.2/v0.2.3 bumps). An explicit push (as
          # the baseline step already does) guarantees the tag lands.
          git tag "${{ steps.decide.outputs.tag }}"
          git push origin "${{ steps.decide.outputs.tag }}"
          gh release create "${{ steps.decide.outputs.tag }}" \
            --title "${{ steps.decide.outputs.tag }}" \
            --notes-file .release-notes.md

      - name: Deploy the released commit
        if: ${{ steps.decide.outputs.status == 'released' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The release commit was pushed with GITHUB_TOKEN + [skip ci], so no
          # push-triggered deploy ran. Dispatch ci.yml on main so the new
          # APP_VERSION + rebuilt engine.mjs actually ship (ci.yml gates its own
          # deploy on the DEPLOY_* repo variables, so this is a no-op for any stack
          # that isn't enabled).
          #
          # reason=release tells ci.yml this commit is byte-identical to the merge
          # commit already tested on push (only version strings + regenerated
          # engine.mjs differ), so it skips the redundant gate/api/e2e jobs and runs
          # only the deploy jobs — the code is tested once per change, not twice.
          # Every enabled target (Supabase/Netlify/Azure) ships from this one run.
          gh workflow run ci.yml --ref main -f reason=release

      - name: Ask a human when the bump is ambiguous
        if: ${{ steps.decide.outputs.status == 'needs-input' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Avoid piling up duplicate issues if several such pushes land.
          existing=$(gh issue list --state open \
            --search 'in:title "Release: version bump needs a decision"' \
            --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "Release: version bump needs a decision" \
              --body-file .release-ambiguous.md
          else
            echo "An open release-decision issue already exists; skipping."
          fi
