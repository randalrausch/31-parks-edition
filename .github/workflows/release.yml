name: Release

# Automated versioning + changelog from Conventional Commits.
#
# On every push to main, this reads the commits since the last tag and:
#   - feat: → minor, fix:/perf: → patch, `!`/BREAKING CHANGE → major
#     (a breaking change while pre-1.0 bumps the minor, never jumps to 1.0.0)
#   - only chore/docs/etc. → no release (nothing happens)
#   - commits it can't classify with no releasing signal → opens an issue asking
#     a human to decide, instead of guessing
#
# A release updates src/game/version.ts (the single version source both backends
# and the frontend read), regenerates the edge bundle, and prepends
# CHANGELOG.md. That change is NOT pushed to main directly — main is expected to
# have ordinary branch protection (require a pull request + required status
# checks), and a bare `git push` of a brand-new commit can never satisfy
# "required status checks" (no check run can exist for a commit that doesn't
# exist on GitHub yet). So instead the bot opens a PR, waits for ci.yml's
# pull_request run to go green on it, and merges it itself — the same path any
# contributor's change takes, just automated. This works out of the box for
# anyone who clones the repo and turns on standard branch protection; it
# doesn't require adding the bot to a bypass list.
#
# The PR merge is done with GITHUB_TOKEN, which (like any GITHUB_TOKEN-authored
# push) does NOT trigger a new workflow run — so without help the release
# commit's own push to main would never deploy, and the live backends would
# keep reporting the old version. To close that skew, once merged this workflow
# tags the merge commit, publishes the GitHub Release, and explicitly dispatches
# the deploy workflow (GITHUB_TOKEN *can* trigger workflow_dispatch).

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write # dispatch the deploy workflow after a release (see final step)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Don't act on the release PR's own squash-merge commit.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Decide release from Conventional Commits
        id: decide
        run: node scripts/release.mjs

      - name: Seed the baseline tag (first run, no bump)
        # No commit to main is involved (just a tag + a GitHub Release), so this
        # isn't affected by branch protection on refs/heads/main.
        if: ${{ steps.decide.outputs.status == 'baseline' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.decide.outputs.tag }}"
          git push origin "${{ steps.decide.outputs.tag }}"
          gh release create "${{ steps.decide.outputs.tag }}" \
            --title "${{ steps.decide.outputs.tag }}" \
            --notes-file .release-notes.md

      - name: Regenerate edge bundle for the new version
        if: ${{ steps.decide.outputs.status == 'released' }}
        run: npm run build:edge

      - name: Open the release PR
        id: pr
        if: ${{ steps.decide.outputs.status == 'released' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/${TAG}"
          git add -A
          git commit -m "chore(release): ${TAG}"
          git push -u origin "release/${TAG}"
          gh pr create \
            --title "chore(release): ${TAG}" \
            --body-file .release-notes.md \
            --base main --head "release/${TAG}"
          number=$(gh pr view "release/${TAG}" --json number --jq '.number')
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Wait for the release PR's checks, then merge it
        if: ${{ steps.decide.outputs.status == 'released' }}
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Blocks until every check on the PR finishes; exits non-zero if any
          # failed (or none are configured yet) so the release stops here with
          # the PR left open for a human, instead of merging something red.
          gh pr checks "${{ steps.pr.outputs.number }}" --watch --interval 15
          gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch

      - name: Tag the merged release commit and publish it
        if: ${{ steps.decide.outputs.status == 'released' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          merge_sha=$(gh pr view "${{ steps.pr.outputs.number }}" --json mergeCommit --jq '.mergeCommit.oid')
          git fetch origin main
          # Tag the release commit and push the tag EXPLICITLY (an implicit
          # `--follow-tags` only pushes ANNOTATED tags, so these lightweight
          # release tags would never reach origin — leaving `git describe`
          # stuck at the baseline and re-counting all history on every release).
          git tag "$TAG" "$merge_sha"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file .release-notes.md

      - name: Deploy the released commit
        if: ${{ steps.decide.outputs.status == 'released' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The release commit landed via a squash-merge performed with
          # GITHUB_TOKEN, so no push-triggered deploy ran for it. Dispatch
          # ci.yml on main so the new APP_VERSION + rebuilt engine.mjs actually
          # ship (ci.yml gates its own deploy on the DEPLOY_* repo variables, so
          # this is a no-op for any stack that isn't enabled).
          #
          # reason=release tells ci.yml this commit's code was already fully
          # tested (once as the pre-bump merge to main, once again as the
          # release PR), so it skips the redundant gate/api/e2e jobs and runs
          # only the deploy jobs.
          gh workflow run ci.yml --ref main -f reason=release

      - name: Ask a human when the bump is ambiguous
        if: ${{ steps.decide.outputs.status == 'needs-input' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Avoid piling up duplicate issues if several such pushes land.
          existing=$(gh issue list --state open \
            --search 'in:title "Release: version bump needs a decision"' \
            --json number --jq 'length')
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "Release: version bump needs a decision" \
              --body-file .release-ambiguous.md
          else
            echo "An open release-decision issue already exists; skipping."
          fi
