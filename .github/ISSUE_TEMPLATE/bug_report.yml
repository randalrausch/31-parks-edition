name: Bug report
description: Something isn't working
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in what you can — the more detail, the faster it's fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which way were you playing?
      options:
        - Solo vs. AI
        - Pass-and-play (one device)
        - Online multiplayer
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The version string from the in-app About dialog (e.g. 0.7.3+123).
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 126 on Android, Safari on iPhone
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste any errors from the browser console (F12 → Console).
      render: text
    validations:
      required: false
