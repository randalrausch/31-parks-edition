# Netlify free-tier static deploy for 31: National Parks Edition.
# Vite outputs a fully static SPA bundle — no server, no functions, no env required.

[build]
  command = "npm run build"
  publish = "dist"

# Hashed build assets must never fall back to index.html — a missing chunk
# should 404 loudly, not silently return HTML (which the browser would try to
# parse as JS/CSS and ignore). Static files that exist are served before this.
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 404

# SPA fallback: every other path serves the built index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
