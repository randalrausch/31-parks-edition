<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover lets the board extend under the iPhone notch / home indicator -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d2418" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="31 Parks" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- PWA: installable to the iOS/Android home screen -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta
      name="description"
      content="31: National Parks Edition — a fast classic card game reimagined with the wonder of America's wild places."
    />
    <title>31 · National Parks Edition</title>

    <!-- Social preview (Open Graph + Twitter). Update og:url / the absolute
         image origin if the site moves to a new domain. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="31 · National Parks Edition" />
    <meta
      property="og:description"
      content="A vintage WPA-poster take on the classic card game 31 — play solo, pass-and-play, or online."
    />
    <meta property="og:url" content="https://31game.netlify.app/" />
    <meta property="og:image" content="https://31game.netlify.app/icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="31 · National Parks Edition" />
    <meta
      name="twitter:description"
      content="A vintage WPA-poster take on the classic card game 31 — play solo, pass-and-play, or online."
    />
    <meta name="twitter:image" content="https://31game.netlify.app/icons/icon-512.png" />

    <!-- WPA-poster type: Bebas Neue (display), Oswald (condensed labels), Roboto Slab (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Roboto+Slab:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
